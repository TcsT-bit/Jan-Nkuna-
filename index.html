<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jan Nkuna Scientific Calculator</title>
<style>
    * { box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
  body {
    background: #d0d0d0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 10px;
  }
  .calc {
    background: linear-gradient(#3a3a3a, #2b2b2b);
    padding: 20px;
    border-radius: 25px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
    width: 360px;
    border: 2px solid #1a1a1a;
  }
  .brand {
    color: #fff;
    font-size: 14px;
    font-weight: bold;
    margin-bottom: 8px;
    letter-spacing: 1px;
    display: flex;
    justify-content: space-between;
  }
  #display {
    width: 100%;
    height: 80px;
    background: #c7d4c7;
    color: #000;
    font-size: 24px;
    text-align: right;
    border: 2px inset #888;
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 15px;
    font-family: 'Courier New', monospace;
  }
  #expression {
    font-size: 14px;
    color: #333;
    height: 18px;
    overflow: hidden;
  }
  #result {
    font-size: 26px;
    font-weight: bold;
  }
  .buttons {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }
  button {
    height: 50px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(#e0e0e0, #c0c0c0);
    color: #000;
    cursor: pointer;
    box-shadow: 0 3px 0 #888, inset 0 1px 0 rgba(255,255,255,0.5);
    transition: all 0.05s;
  }
  button:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 #888;
  }
  .shift { background: linear-gradient(#ff6b6b, #d63031); color: #fff; }
  .alpha { background: linear-gradient(#74b9ff, #0984e3); color: #fff; }
  .func { background: linear-gradient(#a29bfe, #6c5ce7); color: #fff; font-size: 14px; }
  .op { background: linear-gradient(#ffeaa7, #fdcb6e); color: #000; }
  .eq { background: linear-gradient(#00b894, #00a085); color: #fff; grid-row: span 2; height: auto; }
  .clear { background: linear-gradient(#ff7675, #d63031); color: #fff; }
  .small { font-size: 12px; }
</style>
</head>
<body>
<div class="calc">
  <div class="brand">
    <span>Jan Nkuna</span>
    <span>fx-991ES</span>
  </div>
  <div id="display">
    <div id="expression"></div>
    <div id="result">0</div>
  </div>
  <div class="buttons">
    <button class="shift" onclick="toggleShift()">SHIFT</button>
    <button class="alpha" onclick="toggleAlpha()">ALPHA</button>
    <button class="func" onclick="append('Math.sqrt(')">√</button>
    <button class="func" onclick="append('**2')">x²</button>
    <button class="func" onclick="append('**')">xʸ</button>

    <button class="func small" onclick="append('sin(')">sin</button>
    <button class="func small" onclick="append('cos(')">cos</button>
    <button class="func small" onclick="append('tan(')">tan</button>
    <button class="func" onclick="append('log10(')">log</button>
    <button class="func" onclick="append('Math.log(')">ln</button>

    <button class="func" onclick="append(')">(</button>
    <button class="func" onclick="append(')')">)</button>
    <button class="func" onclick="append('Math.PI')">π</button>
    <button class="func" onclick="append('Math.E')">e</button>
    <button class="op" onclick="append('/')">÷</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button class="clear" onclick="clearAll()">AC</button>
    <button class="op" onclick="append('*')">×</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button onclick="del()">DEL</button>
    <button class="op" onclick="append('-')">−</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button onclick="append('0')">0</button>
    <button class="op" onclick="append('+')">+</button>

    <button onclick="append('.')">.</button>
    <button onclick="append('ANS')">ANS</button>
    <button class="func" onclick="append('10**')">10ˣ</button>
    <button class="eq" onclick="calculate()">=</button>
  </div>
</div>

<script>
  let expression = '';
  let result = '0';
  let ans = 0;
  let shift = false;

  const exprEl = document.getElementById('expression');
  const resEl = document.getElementById('result');

  function updateDisplay() {
    exprEl.textContent = expression;
    resEl.textContent = result;
  }

  function append(val) {
    if (result === 'Error') result = '0';
    if (expression === '0' && !['+', '-', '*', '/', '**'].includes(val)) expression = '';
    expression += val;
    updateDisplay();
  }

  function clearAll() {
    expression = '';
    result = '0';
    updateDisplay();
  }

  function del() {
    expression = expression.slice(0, -1);
    updateDisplay();
  }

  function calculate() {
    try {
      let expr = expression.replace(/ANS/g, ans);
      expr = expr.replace(/(\d|\))\(/g, '$1*(');
      expr = expr
        .replace(/sin\(/g, 'Math.sin(')
        .replace(/cos\(/g, 'Math.cos(')
        .replace(/tan\(/g, 'Math.tan(')
        .replace(/log10\(/g, 'Math.log10(')
        .replace(/Math\.log\(/g, 'Math.log(');

      let evalResult = eval(expr);
      ans = evalResult;
      result = parseFloat(evalResult.toPrecision(12)).toString();
      expression = result;
    } catch {
      result = 'Error';
    }
    updateDisplay();
  }

  function toggleShift() {
    shift = !shift;
    alert(shift ? 'SHIFT ON' : 'SHIFT OFF');
  }

  function toggleAlpha() {
    alert('ALPHA mode not implemented in this version');
  }

  document.addEventListener('keydown', (e) => {
    if ((e.key >= '0' && e.key <= '9') || e.key === '.') append(e.key);
    if (e.key === '+' || e.key === '-' || e.key === '*' || e.key === '/') append(e.key);
    if (e.key === 'Enter') calculate();
    if (e.key === 'Backspace') del();
    if (e.key === 'Escape') clearAll();
    if (e.key === '(' || e.key === ')') append(e.key);
  });

  updateDisplay();
</script>
</body>
</html>
