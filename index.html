<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jan Nkuna Scientific Calculator</title>
<style>
    * { box-sizing: border-box; font-family: 'Roboto', Arial, sans-serif; }
  body {
    background: #000;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
  }
  .calc {
    width: 100%;
    max-width: 480px;
    background: #f5f5f5;
  }
  .status {
    text-align: center;
    padding: 8px;
    font-size: 12px;
    color: #666;
    letter-spacing: 1px;
  }
  #display {
    background: #fff;
    padding: 20px 16px;
    min-height: 140px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    border-bottom: 1px solid #e0e0e0;
  }
  #expression {
    font-size: 18px;
    color: #000;
    min-height: 24px;
    word-wrap: break-word;
  }
  #result {
    font-size: 48px;
    color: #000;
    text-align: right;
    font-weight: 300;
  }
  .mode {
    display: flex;
    justify-content: space-between;
    padding: 8px 16px;
    font-size: 12px;
    color: #666;
    background: #f5f5f5;
  }
  .buttons {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 1px;
    background: #e0e0e0;
  }
  button {
    height: 56px;
    border: none;
    font-size: 14px;
    cursor: pointer;
    position: relative;
    background: #e8e8e8;
    color: #000;
  }
  button:active { opacity: 0.7; }
  .small {
    font-size: 10px;
    position: absolute;
    top: 4px;
    left: 0;
    right: 0;
    text-align: center;
    color: #666;
  }
  .btn-content {
    padding-top: 12px;
  }
  .shift { background: #4caf50; color: #fff; }
  .alpha { background: #4caf50; color: #fff; }
  .orange { background: #ff9800; color: #fff; }
  .light { background: #e8e8e8; color: #000; }
  .dark { background: #424242; color: #fff; }
  .blue { background: #64b5f6; color: #fff; }
  .gray { background: #757575; color: #fff; }
</style>
</head>
<body>
<div class="calc">
  <div class="status">GRAD &nbsp;&nbsp;&nbsp;&nbsp; M</div>
  <div id="display">
    <div id="expression"></div>
    <div id="result">0</div>
  </div>
  <div class="mode">
    <span>EXPR</span>
    <span>CPLX</span>
  </div>
  <div class="buttons">
    <!-- Row 1 -->
    <button class="shift" onclick="toggleShift()">
      <div class="small">DRG</div><div class="btn-content">SHIFT</div>
    </button>
    <button class="light" onclick="toggleAlpha()">
      <div class="small">FSE</div><div class="btn-content">MENU</div>
    </button>
    <button class="light" onclick="moveLeft()">
      <div class="small">MTRX</div><div class="btn-content">◄</div>
    </button>
    <button class="light" onclick="moveRight()">
      <div class="small">Π</div><div class="btn-content">►</div>
    </button>
    <button class="orange" onclick="del()">
      <div class="small">d/dx</div><div class="btn-content">⌫</div>
    </button>
    <button class="orange" onclick="clearAll()">
      <div class="small">CNST</div><div class="btn-content">AC</div>
    </button>

    <!-- Row 2 -->
    <button class="light" onclick="append('DRG')">
      <div class="small">hyp</div><div class="btn-content">DRG</div>
    </button>
    <button class="light" onclick="append('x⇄E')">
      <div class="small">sin⁻¹</div><div class="btn-content">x⇄E</div>
    </button>
    <button class="light" onclick="append('MTRX')">
      <div class="small">cos⁻¹</div><div class="btn-content">⊞</div>
    </button>
    <button class="light" onclick="append('Σ')">
      <div class="small">tan⁻¹</div><div class="btn-content">Σ</div>
    </button>
    <button class="light" onclick="append('∫dx')">
      <div class="small">∠</div><div class="btn-content">∫dx</div>
    </button>
    <button class="light" onclick="append('CONV')">
      <div class="small">logₓy</div><div class="btn-content">CONV</div>
    </button>

    <!-- Row 3 -->
    <button class="light" onclick="append('Math.PI')">
      <div class="small">π</div><div class="btn-content">π</div>
    </button>
    <button class="light" onclick="append('sin(')">
      <div class="small">sin</div><div class="btn-content">sin</div>
    </button>
    <button class="light" onclick="append('cos(')">
      <div class="small">cos</div><div class="btn-content">cos</div>
    </button>
    <button class="light" onclick="append('tan(')">
      <div class="small">tan</div><div class="btn-content">tan</div>
    </button>
    <button class="light" onclick="append('i')">
      <div class="small">i</div><div class="btn-content">i</div>
    </button>
    <button class="light" onclick="append('Math.E')">
      <div class="small">e</div><div class="btn-content">e</div>
    </button>

    <!-- Row 4 -->
    <button class="light" onclick="append('lim')">
      <div class="small">lim</div><div class="btn-content">lim</div>
    </button>
    <button class="light" onclick="append('x³')">
      <div class="small">x³</div><div class="btn-content">x³</div>
    </button>
    <button class="light" onclick="append('∛x')">
      <div class="small">∛x</div><div class="btn-content">∛x</div>
    </button>
    <button class="light" onclick="append('ˣ√y')">
      <div class="small">ˣ√y</div><div class="btn-content">ˣ√y</div>
    </button>
    <button class="light" onclick="append('10^')">
      <div class="small">10ˣ</div><div class="btn-content">10ˣ</div>
    </button>
    <button class="light" onclick="append('e^')">
      <div class="small">eˣ</div><div class="btn-content">eˣ</div>
    </button>

    <!-- Row 5 -->
    <button class="light" onclick="append('x⁻¹')">
      <div class="small">STAT</div><div class="btn-content">x⁻¹</div>
    </button>
    <button class="light" onclick="append('x²')">
      <div class="small">aᵇ/꜀</div><div class="btn-content">x²</div>
    </button>
    <button class="light" onclick="append('√(')">
      <div class="small">Y</div><div class="btn-content">√x</div>
    </button>
    <button class="light" onclick="append('xʸ')">
      <div class="small">HISTORY</div><div class="btn-content">xʸ</div>
    </button>
    <button class="light" onclick="append('log(')">
      <div class="small">M+</div><div class="btn-content">log</div>
    </button>
    <button class="light" onclick="append('ln(')">
      <div class="small">M-</div><div class="btn-content">ln</div>
    </button>

    <!-- Row 6 -->
    <button class="light" onclick="append('D°M′S')">
      <div class="small">CPLX</div><div class="btn-content">D°M′S</div>
    </button>
    <button class="light" onclick="append('ᵈ/꜀')">
      <div class="small">∞</div><div class="btn-content">ᵈ/꜀</div>
    </button>
    <button class="blue" onclick="append('X')">
      <div class="small"></div><div class="btn-content">X</div>
    </button>
    <button class="blue" onclick="append('XY,M')">
      <div class="small"></div><div class="btn-content">XY,M</div>
    </button>
    <button class="blue" onclick="append('MR')">
      <div class="small"></div><div class="btn-content">MR</div>
    </button>
    <button class="blue" onclick="append('x→M')">
      <div class="small"></div><div class="btn-content">x→M</div>
    </button>

    <!-- Row 7 -->
    <button class="dark" onclick="append('7')">
      <div class="small">n!</div><div class="btn-content">7</div>
    </button>
    <button class="dark" onclick="append('8')">
      <div class="small">nCr</div><div class="btn-content">8</div>
    </button>
    <button class="dark" onclick="append('9')">
      <div class="small">nPr</div><div class="btn-content">9</div>
    </button>
    <button class="gray" onclick="append(')">
      <div class="small">BIN</div><div class="btn-content">(</div>
    </button>
    <button class="gray" onclick="append(')')">
      <div class="small">OCT</div><div class="btn-content">)</div>
    </button>
    <button class="gray"></button>

    <!-- Row 8 -->
    <button class="dark" onclick="append('4')">
      <div class="small">gcd</div><div class="btn-content">4</div>
    </button>
    <button class="dark" onclick="append('5')">
      <div class="small">lcm</div><div class="btn-content">5</div>
    </button>
    <button class="dark" onclick="append('6')">
      <div class="small">abs</div><div class="btn-content">6</div>
    </button>
    <button class="gray" onclick="append('*')">
      <div class="small">DEC</div><div class="btn-content">×</div>
    </button>
    <button class="gray" onclick="append('/')">
      <div class="small">HEX</div><div class="btn-content">÷</div>
    </button>
    <button class="gray"></button>

    <!-- Row 9 -->
    <button class="dark" onclick="append('1')">
      <div class="small">OTHER</div><div class="btn-content">1</div>
    </button>
    <button class="dark" onclick="append('2')">
      <div class="small">ran#</div><div class="btn-content">2</div>
    </button>
    <button class="dark" onclick="append('3')">
      <div class="small">Ans</div><div class="btn-content">3</div>
    </button>
    <button class="gray" onclick="append('+')">
      <div class="small">EXP SI</div><div class="btn-content">+</div>
    </button>
    <button class="gray" onclick="append('-')">
      <div class="small"></div><div class="btn-content">-</div>
    </button>
    <button class="gray"></button>

    <!-- Row 10 -->
    <button class="dark" onclick="append('0')">
      <div class="small"></div><div class="btn-content">0</div>
    </button>
    <button class="dark" onclick="append('.')">
      <div class="small"></div><div class="btn-content">.</div>
    </button>
    <button class="dark" onclick="append('+/-')">
      <div class="small"></div><div class="btn-content">+/-</div>
    </button>
    <button class="gray" onclick="append('EXP')">
      <div class="small"></div><div class="btn-content">EXP</div>
    </button>
    <button class="gray" onclick="calculate()">
      <div class="small"></div><div class="btn-content">✓</div>
    </button>
    <button class="gray"></button>
  </div>
</div>

<script>
  let expression = '';
  let result = '0';
  let ans = 0;
  let shift = false;

  const exprEl = document.getElementById('expression');
  const resEl = document.getElementById('result');

  function updateDisplay() {
    exprEl.textContent = expression;
    resEl.textContent = result;
  }

  function append(val) {
    if (result === 'Error') { result = '0'; expression = ''; }
    expression += val;
    updateDisplay();
  }

  function clearAll() {
    expression = '';
    result = '0';
    updateDisplay();
  }

  function del() {
    expression = expression.slice(0, -1);
    updateDisplay();
  }

  function moveLeft() {}
  function moveRight() {}

  function calculate() {
    try {
      let expr = expression
        .replace(/ANS/g, ans)
        .replace(/x²/g, '**2')
        .replace(/x³/g, '**3')
        .replace(/xʸ/g, '**')
        .replace(/x⁻¹/g, '**-1')
        .replace(/√\(/g, 'Math.sqrt(')
        .replace(/∛x/g, 'Math.cbrt(')
        .replace(/ˣ√y/g, 'Math.pow(')
        .replace(/sin⁻¹\(/g, 'Math.asin(')
        .replace(/cos⁻¹\(/g, 'Math.acos(')
        .replace(/tan⁻¹\(/g, 'Math.atan(')
        .replace(/sin\(/g, 'Math.sin(')
        .replace(/cos\(/g, 'Math.cos(')
        .replace(/tan\(/g, 'Math.tan(')
        .replace(/log\(/g, 'Math.log10(')
        .replace(/ln\(/g, 'Math.log(')
        .replace(/10\^/g, '10**')
        .replace(/e\^/g, 'Math.exp(')
        .replace(/π/g, 'Math.PI')
        .replace(/e/g, 'Math.E')
        .replace(/EXP/g, 'e')
        .replace(/×/g, '*')
        .replace(/÷/g, '/');

      let evalResult = eval(expr);
      ans = evalResult;
      result = parseFloat(evalResult.toPrecision(12)).toString();
      expression = result;
    } catch {
      result = 'Error';
    }
    updateDisplay();
  }

  function toggleShift() {
    shift = !shift;
    document.querySelector('.shift').style.outline = shift ? '2px solid #4caf50' : 'none';
  }

  function toggleAlpha() {
    alert('ALPHA mode: Not implemented in this version');
  }

  document.addEventListener('keydown', (e) => {
    if ((e.key >= '0' && e.key <= '9') || e.key === '.') append(e.key);
    if (['+', '-', '*', '/'].includes(e.key)) append(e.key);
    if (e.key === 'Enter') calculate();
    if (e.key === 'Backspace') del();
    if (e.key === 'Escape') clearAll();
    if (e.key === '(' || e.key === ')') append(e.key);
  });

  updateDisplay();
</script>
</body>
</html>
