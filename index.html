<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jan Nkuna Scientific Calculator</title>
<style>
    * { box-sizing: border-box; font-family: 'Roboto', Arial, sans-serif; }
  body {
    background: #121212;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 10px;
  }
  .calc {
    background: #1e1e1e;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    width: 380px;
    border: 1px solid #333;
  }
  .brand {
    color: #bbb;
    font-size: 12px;
    font-weight: 500;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }
  #display {
    width: 100%;
    height: 90px;
    background: #d7e4d7;
    color: #000;
    font-size: 22px;
    text-align: right;
    border: none;
    border-radius: 6px;
    padding: 8px 12px;
    margin-bottom: 12px;
    font-family: 'Courier New', monospace;
  }
  #expression {
    font-size: 14px;
    color: #333;
    height: 20px;
    overflow: hidden;
  }
  #result {
    font-size: 28px;
    font-weight: bold;
  }
  .buttons {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
  }
  button {
    height: 45px;
    font-size: 14px;
    border: none;
    border-radius: 6px;
    background: #2d2d2d;
    color: #fff;
    cursor: pointer;
    transition: 0.1s;
  }
  button:active {
    transform: scale(0.95);
    opacity: 0.8;
  }
  .shift { background: #f4b400; color: #000; font-weight: bold; }
  .alpha { background: #0f9d58; color: #fff; font-weight: bold; }
  .func { background: #3c3c3c; color: #fff; font-size: 12px; }
  .num { background: #424242; }
  .op { background: #5f6368; }
  .eq { background: #4285f4; grid-row: span 2; height: auto; }
  .clear { background: #db4437; }
  .small { font-size: 11px; }
</style>
</head>
<body>
<div class="calc">
  <div class="brand">
    <span>Jan Nkuna</span>
    <span>fx-991EX</span>
  </div>
  <div id="display">
    <div id="expression"></div>
    <div id="result">0</div>
  </div>
  <div class="buttons">
    <button class="shift" onclick="toggleShift()">SHIFT</button>
    <button class="alpha" onclick="toggleAlpha()">ALPHA</button>
    <button class="func" onclick="append('CALC')">CALC</button>
    <button class="func" onclick="append('MODE')">MODE</button>
    <button class="func" onclick="append('ON')">ON</button>
    <button class="clear" onclick="clearAll()">AC</button>

    <button class="func small" onclick="append('sin⁻¹(')">sin⁻¹</button>
    <button class="func small" onclick="append('cos⁻¹(')">cos⁻¹</button>
    <button class="func small" onclick="append('tan⁻¹(')">tan⁻¹</button>
    <button class="func" onclick="append('x⁻¹')">x⁻¹</button>
    <button class="func" onclick="append('log(')">log</button>
    <button class="func" onclick="append('ln(')">ln</button>

    <button class="func" onclick="append(')">(</button>
    <button class="func" onclick="append(')')">)</button>
    <button class="func" onclick="append('x²')">x²</button>
    <button class="func" onclick="append('x³')">x³</button>
    <button class="func" onclick="append('xʸ')">xʸ</button>
    <button class="func" onclick="append('√(')">√</button>

    <button class="func" onclick="append('ENG')">ENG</button>
    <button class="func" onclick="append('(-)')">(-)</button>
    <button class="num" onclick="append('7')">7</button>
    <button class="num" onclick="append('8')">8</button>
    <button class="num" onclick="append('9')">9</button>
    <button class="clear" onclick="del()">DEL</button>

    <button class="func" onclick="append('RCL')">RCL</button>
    <button class="func" onclick="append('STO')">STO</button>
    <button class="num" onclick="append('4')">4</button>
    <button class="num" onclick="append('5')">5</button>
    <button class="num" onclick="append('6')">6</button>
    <button class="op" onclick="append('*')">×</button>

    <button class="func" onclick="append('HYP')">HYP</button>
    <button class="func" onclick="append('Pol(')">Pol</button>
    <button class="num" onclick="append('1')">1</button>
    <button class="num" onclick="append('2')">2</button>
    <button class="num" onclick="append('3')">3</button>
    <button class="op" onclick="append('-')">−</button>

    <button class="func" onclick="append('M+')">M+</button>
    <button class="func" onclick="append('M-')">M-</button>
    <button class="num" onclick="append('0')">0</button>
    <button class="num" onclick="append('.')">.</button>
    <button class="func" onclick="append('EXP')">EXP</button>
    <button class="op" onclick="append('+')">+</button>

    <button class="func" onclick="append('ANS')">ANS</button>
    <button class="func" onclick="append('Math.PI')">π</button>
    <button class="func" onclick="append('Math.E')">e</button>
    <button class="func" onclick="append('10^')">10ˣ</button>
    <button class="eq" onclick="calculate()">=</button>
  </div>
</div>

<script>
  let expression = '';
  let result = '0';
  let ans = 0;
  let shift = false;

  const exprEl = document.getElementById('expression');
  const resEl = document.getElementById('result');

  function updateDisplay() {
    exprEl.textContent = expression;
    resEl.textContent = result;
  }

  function append(val) {
    if (result === 'Error') result = '0';
    expression += val;
    updateDisplay();
  }

  function clearAll() {
    expression = '';
    result = '0';
    updateDisplay();
  }

  function del() {
    expression = expression.slice(0, -1);
    updateDisplay();
  }

  function calculate() {
    try {
      let expr = expression
        .replace(/ANS/g, ans)
        .replace(/x²/g, '**2')
        .replace(/x³/g, '**3')
        .replace(/xʸ/g, '**')
        .replace(/x⁻¹/g, '**-1')
        .replace(/√\(/g, 'Math.sqrt(')
        .replace(/sin⁻¹\(/g, 'Math.asin(')
        .replace(/cos⁻¹\(/g, 'Math.acos(')
        .replace(/tan⁻¹\(/g, 'Math.atan(')
        .replace(/sin\(/g, 'Math.sin(')
        .replace(/cos\(/g, 'Math.cos(')
        .replace(/tan\(/g, 'Math.tan(')
        .replace(/log\(/g, 'Math.log10(')
        .replace(/ln\(/g, 'Math.log(')
        .replace(/10\^/g, '10**')
        .replace(/EXP/g, 'e');

      let evalResult = eval(expr);
      ans = evalResult;
      result = parseFloat(evalResult.toPrecision(12)).toString();
      expression = result;
    } catch {
      result = 'Error';
    }
    updateDisplay();
  }

  function toggleShift() {
    shift = !shift;
    document.querySelector('.shift').style.outline = shift ? '2px solid #f4b400' : 'none';
  }

  function toggleAlpha() {
    alert('ALPHA mode: Not implemented in this version');
  }

  document.addEventListener('keydown', (e) => {
    if ((e.key >= '0' && e.key <= '9') || e.key === '.') append(e.key);
    if (['+', '-', '*', '/'].includes(e.key)) append(e.key);
    if (e.key === 'Enter') calculate();
    if (e.key === 'Backspace') del();
    if (e.key === 'Escape') clearAll();
    if (e.key === '(' || e.key === ')') append(e.key);
  });

  updateDisplay();
</script>
</body>
</html>
