<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Jan Nkuna Scientific Calculator</title>
<script type="importmap">
{
  "imports": {
    "mathjs": "https://cdn.jsdelivr.net/npm/mathjs@11.11.0/+esm"
  }
}
</script>
<style>
    * { box-sizing: border-box; font-family: 'Roboto', Arial, sans-serif; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  html, body { background: #000; margin: 0; padding: 0; height: 100%; overflow: hidden; }
  .calc { width: 100vw; height: 100dvh; display: flex; flex-direction: column; background: #f5f5f5; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
  .status { display: flex; justify-content: space-between; align-items: center; padding: 6px 12px; font-size: 11px; color: #666; flex-shrink: 0; background: #f5f5f5; min-height: 28px; }
  .brand-name { font-weight: 600; color: #333; font-size: 12px; }
  #display { background: #fff; padding: 10px 16px; flex: 0 0 auto; display: flex; flex-direction: column; justify-content: space-between; border-bottom: 1px solid #e0e0e0; }
  #expression { font-size: 15px; color: #000; min-height: 18px; word-wrap: break-word; overflow: hidden; }
  #result { font-size: 38px; color: #000; text-align: right; font-weight: 300; line-height: 1.1; }
  .mode { display: flex; justify-content: space-between; padding: 5px 16px; font-size: 11px; color: #666; background: #f5f5f5; flex-shrink: 0; }
  .buttons { display: grid; grid-template-columns: repeat(6, 1fr); gap: 1px; background: #e0e0e0; flex: 1 1 auto; min-height: 0; }
  button { border: none; font-size: 16px; cursor: pointer; position: relative; background: #e8e8e8; color: #000; padding: 0; width: 100%; height: 100%; }
  button:active { opacity: 0.7; }
  .small { font-size: 9px; position: absolute; top: 2px; left: 0; right: 0; text-align: center; color: #666; }
  .btn-content { padding-top: 10px; font-size: 14px; }
  .shift { background: #4caf50; color: #fff; }
  .orange { background: #ff9800; color: #fff; }
  .light { background: #e8e8e8; color: #000; }
  .dark { background: #424242; color: #fff; }
  .blue { background: #64b5f6; color: #fff; }
  .gray { background: #757575; color: #fff; }
  .eq { background: #4285f4; color: #fff; }
  .menu-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; z-index: 100; }
  .menu-overlay.active { display: block; }
  .menu { position: absolute; top: 80px; left: 10px; width: 220px; background: #2d2d2d; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
  .menu-item { display: flex; align-items: center; padding: 12px 16px; color: #fff; font-size: 14px; cursor: pointer; }
  .menu-item:hover { background: #3d3d3d; }
  .menu-divider { height: 1px; background: #444; margin: 4px 0; }
  .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #2d2d2d; color: #fff; padding: 20px; border-radius: 8px; display: none; z-index: 101; width: 90%; max-width: 300px; }
  .modal.active { display: block; }
  .modal h3 { margin: 0 0 15px 0; font-size: 16px; }
  .modal button { background: #4285f4; color: #fff; padding: 8px 16px; border-radius: 4px; margin-top: 10px; height: auto; width: auto; }
  select { width: 100%; padding: 8px; background: #1e1e1e; color: #fff; border: 1px solid #444; border-radius: 4px; }
</style>
</head>
<body>
<div class="calc">
  <div class="status">
    <span class="brand-name">Jan Nkuna</span>
    <span id="modeDisplay">DEG &nbsp;&nbsp; M</span>
  </div>
  <div id="display">
    <div id="expression"></div>
    <div id="result">0</div>
  </div>
  <div class="mode">
    <span>EXPR</span>
    <span>CPLX</span>
  </div>
  <div class="buttons" id="buttons">
    <!-- Row 1 - Command buttons call functions directly -->
    <button class="shift" onclick="window.toggleShift()" aria-label="Shift">
      <div class="small" data-normal="DRG" data-shift="DRG">DRG</div><div class="btn-content">SHIFT</div>
    </button>
    <button class="light" onclick="window.toggleMenu()" aria-label="Menu">
      <div class="small" data-normal="FSE" data-shift="FSE">FSE</div><div class="btn-content">MENU</div>
    </button>
    <button class="light" onclick="window.moveLeft()" aria-label="Left">
      <div class="small" data-normal="MTRX" data-shift="MTRX">MTRX</div><div class="btn-content">◄</div>
    </button>
    <button class="light" onclick="window.moveRight()" aria-label="Right">
      <div class="small" data-normal="Π" data-shift="Π">Π</div><div class="btn-content">►</div>
    </button>
    <button class="orange" onclick="window.del()" aria-label="Delete">
      <div class="small" data-normal="d/dx" data-shift="d/dx">d/dx</div><div class="btn-content">⌫</div>
    </button>
    <button class="orange" onclick="window.clearAll()" aria-label="All Clear">
      <div class="small" data-normal="CNST" data-shift="CNST">CNST</div><div class="btn-content">AC</div>
    </button>

    <!-- Row 2 -->
    <button class="light" onclick="window.handleKey('hyp(', 'sinh(')">
      <div class="small" data-normal="hyp" data-shift="sinh">hyp</div><div class="btn-content">DRG</div>
    </button>
    <button class="light" onclick="window.handleKey('sin⁻¹(', 'asin(')">
      <div class="small" data-normal="sin⁻¹" data-shift="asin">sin⁻¹</div><div class="btn-content">x⇄E</div>
    </button>
    <button class="light" onclick="window.handleKey('cos⁻¹(', 'acos(')">
      <div class="small" data-normal="cos⁻¹" data-shift="acos">cos⁻¹</div><div class="btn-content">⊞</div>
    </button>
    <button class="light" onclick="window.handleKey('tan⁻¹(', 'atan(')">
      <div class="small" data-normal="tan⁻¹" data-shift="atan">tan⁻¹</div><div class="btn-content">Σ</div>
    </button>
    <button class="light" onclick="window.handleKey('∫(', '∫')">
      <div class="small" data-normal="∠" data-shift="∠">∠</div><div class="btn-content">∫dx</div>
    </button>
    <button class="light" onclick="window.handleKey('logbase(', 'logbase(')">
      <div class="small" data-normal="logₓy" data-shift="logₓy">logₓy</div><div class="btn-content">CONV</div>
    </button>

    <!-- Row 3 -->
    <button class="light" onclick="window.handleKey('pi', 'pi')">
      <div class="small" data-normal="π" data-shift="π">π</div><div class="btn-content">π</div>
    </button>
    <button class="light" onclick="window.handleKey('sin(', 'sin(')">
      <div class="small" data-normal="sin" data-shift="sin">sin</div><div class="btn-content">sin</div>
    </button>
    <button class="light" onclick="window.handleKey('cos(', 'cos(')">
      <div class="small" data-normal="cos" data-shift="cos">cos</div><div class="btn-content">cos</div>
    </button>
    <button class="light" onclick="window.handleKey('tan(', 'tan(')">
      <div class="small" data-normal="tan" data-shift="tan">tan</div><div class="btn-content">tan</div>
    </button>
    <button class="light" onclick="window.handleKey('i', 'i')">
      <div class="small" data-normal="i" data-shift="i">i</div><div class="btn-content">i</div>
    </button>
    <button class="light" onclick="window.handleKey('e', 'e')">
      <div class="small" data-normal="e" data-shift="e">e</div><div class="btn-content">e</div>
    </button>

    <!-- Row 4 -->
    <button class="light" onclick="window.handleKey('lim(', 'lim(')">
      <div class="small" data-normal="lim" data-shift="lim">lim</div><div class="btn-content">lim</div>
    </button>
    <button class="light" onclick="window.handleKey('^3', '^3')">
      <div class="small" data-normal="x³" data-shift="x³">x³</div><div class="btn-content">x³</div>
    </button>
    <button class="light" onclick="window.handleKey('cbrt(', 'cbrt(')">
      <div class="small" data-normal="∛x" data-shift="∛x">∛x</div><div class="btn-content">∛x</div>
    </button>
    <button class="light" onclick="window.handleKey('nthRoot(', 'nthRoot(')">
      <div class="small" data-normal="ˣ√y" data-shift="ˣ√y">ˣ√y</div><div class="btn-content">ˣ√y</div>
    </button>
    <button class="light" onclick="window.handleKey('10^', '10^')">
      <div class="small" data-normal="10ˣ" data-shift="10ˣ">10ˣ</div><div class="btn-content">10ˣ</div>
    </button>
    <button class="light" onclick="window.handleKey('exp(', 'exp(')">
      <div class="small" data-normal="eˣ" data-shift="eˣ">eˣ</div><div class="btn-content">eˣ</div>
    </button>

    <!-- Row 5 -->
    <button class="light" onclick="window.handleKey('^-1', '^-1')">
      <div class="small" data-normal="STAT" data-shift="STAT">STAT</div><div class="btn-content">x⁻¹</div>
    </button>
    <button class="light" onclick="window.handleKey('^2', '^2')">
      <div class="small" data-normal="aᵇ/꜀" data-shift="aᵇ/꜀">aᵇ/꜀</div><div class="btn-content">x²</div>
    </button>
    <button class="light" onclick="window.handleKey('sqrt(', 'sqrt(')">
      <div class="small" data-normal="√x" data-shift="√x">√x</div><div class="btn-content">√x</div>
    </button>
    <button class="light" onclick="window.handleKey('^', '^')">
      <div class="small" data-normal="HISTORY" data-shift="HISTORY">HISTORY</div><div class="btn-content">xʸ</div>
    </button>
    <button class="light" onclick="window.handleKey('log10(', 'log10(')">
      <div class="small" data-normal="M+" data-shift="M+">M+</div><div class="btn-content">log</div>
    </button>
    <button class="light" onclick="window.handleKey('log(', 'log(')">
      <div class="small" data-normal="M-" data-shift="M-">M-</div><div class="btn-content">ln</div>
    </button>

    <!-- Row 6 -->
    <button class="light" onclick="window.handleKey('D°M′S', 'D°M′S')">
      <div class="small">CPLX</div><div class="btn-content">D°M′S</div>
    </button>
    <button class="light" onclick="window.handleKey('∞', '∞')">
      <div class="small">∞</div><div class="btn-content">ᵈ/꜀</div>
    </button>
    <button class="blue" onclick="window.handleKey('X', 'X')"><div class="small">X</div><div class="btn-content">X</div></button>
    <button class="blue" onclick="window.handleKey('XY,M', 'XY,M')"><div class="small">XY,M</div><div class="btn-content">XY,M</div></button>
    <button class="blue" onclick="window.handleKey('MR', 'MR')"><div class="small">MR</div><div class="btn-content">MR</div></button>
    <button class="blue" onclick="window.handleKey('x→M', 'x→M')"><div class="small">x→M</div><div class="btn-content">x→M</div></button>

    <!-- Row 7 -->
    <button class="dark" onclick="window.handleKey('7', 'factorial(')">
      <div class="small" data-normal="n!" data-shift="n!">n!</div><div class="btn-content">7</div>
    </button>
    <button class="dark" onclick="window.handleKey('8', 'nCr(')">
      <div class="small" data-normal="nCr" data-shift="nCr">nCr</div><div class="btn-content">8</div>
    </button>
    <button class="dark" onclick="window.handleKey('9', 'nPr(')">
      <div class="small" data-normal="nPr" data-shift="nPr">nPr</div><div class="btn-content">9</div>
    </button>
    <button class="gray" onclick="window.handleKey('(', '(')">
      <div class="small">BIN</div><div class="btn-content">(</div>
    </button>
    <button class="gray" onclick="window.handleKey(')', ')')">
      <div class="small">OCT</div><div class="btn-content">)</div>
    </button>
    <button class="gray"></button>

    <!-- Row 8 -->
    <button class="dark" onclick="window.handleKey('4', 'gcd(')">
      <div class="small" data-normal="gcd" data-shift="gcd">gcd</div><div class="btn-content">4</div>
    </button>
    <button class="dark" onclick="window.handleKey('5', 'lcm(')">
      <div class="small" data-normal="lcm" data-shift="lcm">lcm</div><div class="btn-content">5</div>
    </button>
    <button class="dark" onclick="window.handleKey('6', 'abs(')">
      <div class="small" data-normal="abs" data-shift="abs">abs</div><div class="btn-content">6</div>
    </button>
    <button class="gray" onclick="window.handleKey('*', '*')">
      <div class="small">DEC</div><div class="btn-content">×</div>
    </button>
    <button class="gray" onclick="window.handleKey('/', '/')">
      <div class="small">HEX</div><div class="btn-content">÷</div>
    </button>
    <button class="gray"></button>

    <!-- Row 9 -->
    <button class="dark" onclick="window.handleKey('1', 'OTHER')">
      <div class="small">OTHER</div><div class="btn-content">1</div>
    </button>
    <button class="dark" onclick="window.handleKey('2', 'random()')">
      <div class="small">ran#</div><div class="btn-content">2</div>
    </button>
    <button class="dark" onclick="window.handleKey('3', 'Ans')">
      <div class="small">Ans</div><div class="btn-content">3</div>
    </button>
    <button class="gray" onclick="window.handleKey('+', '+')">
      <div class="small">EXP SI</div><div class="btn-content">+</div>
    </button>
    <button class="gray" onclick="window.handleKey('-', '-')">
      <div class="small"></div><div class="btn-content">-</div>
    </button>
    <button class="gray"></button>

    <!-- Row 10 -->
    <button class="dark" onclick="window.handleKey('0', '0')">
      <div class="small"></div><div class="btn-content">0</div>
    </button>
    <button class="dark" onclick="window.handleKey('.', '.')">
      <div class="small"></div><div class="btn-content">.</div>
    </button>
    <button class="dark" onclick="window.toggleNegate()">
      <div class="small"></div><div class="btn-content">+/-</div>
    </button>
    <button class="gray" onclick="window.handleKey('e', 'e')">
      <div class="small"></div><div class="btn-content">EXP</div>
    </button>
    <button class="eq" onclick="window.calculate()">
      <div class="small"></div><div class="btn-content">✓</div>
    </button>
    <button class="gray"></button>
  </div>
</div>

<!-- Menu Overlay -->
<div class="menu-overlay" id="menuOverlay" onclick="window.toggleMenu()">
  <div class="menu" onclick="event.stopPropagation()">
    <div class="menu-item" onclick="window.openMode()">Mode</div>
    <div class="menu-item" onclick="alert('Layout: Not implemented yet')">Layout</div>
    <div class="menu-item" onclick="alert('Theme: Not implemented yet')">Theme</div>
    <div class="menu-item" onclick="alert('Settings: Not implemented yet')">Settings</div>
    <div class="menu-item" onclick="window.showHistory()">History</div>
    <div class="menu-item" onclick="window.copyResult()">Clipboard</div>
    <div class="menu-divider"></div>
    <div class="menu-item" onclick="alert('Help: Press SHIFT for secondary functions. MENU for settings.')">Help</div>
    <div class="menu-item" onclick="alert('Jan Nkuna Calculator v1.0')">About</div>
    <div class="menu-divider"></div>
    <div class="menu-item" onclick="alert('Upgrade feature not available in this version')">Upgrade or Ads</div>
  </div>
</div>

<!-- Mode Modal -->
<div class="modal" id="modeModal">
  <h3>Angle Mode</h3>
  <select id="angleMode">
    <option value="deg">DEG - Degrees</option>
    <option value="rad">RAD - Radians</option>
    <option value="grad">GRAD - Gradians</option>
  </select>
  <button onclick="window.setMode()">OK</button>
</div>

<script type="module">
  import * as math from 'mathjs';

  let expression = '';
  let result = '0';
  let ans = 0;
  let shift = false;
  let angleMode = 'deg';
  let history = [];
  const MAX_HISTORY = 50;

  const exprEl = document.getElementById('expression');
  const resEl = document.getElementById('result');
  const modeDisplay = document.getElementById('modeDisplay');

  const mathInstance = math.create(math.all, { angle: angleMode });

  function updateDisplay() {
    exprEl.textContent = expression;
    resEl.textContent = result;
    modeDisplay.textContent = angleMode.toUpperCase() + '    M';
  }

  function sanitizeInput(input) {
    return input.replace(/[^0-9+\-*/().,a-zA-Z^_ ]/g, '');
  }

  function handleKey(normal, shiftVal) {
    let val = shift ? shiftVal : normal;
    append(val);
    if(shift) toggleShift();
  }

  function append(val) {
    if (result === 'Error') { result = '0'; expression = ''; }
    expression += sanitizeInput(val);
    updateDisplay();
  }

  function clearAll() {
    expression = ''; result = '0'; shift = false; 
    document.querySelector('.shift').style.outline = 'none';
    updateDisplay();
  }

  function del() {
    expression = expression.slice(0, -1); updateDisplay();
  }

  function toggleNegate() {
    if (expression) {
      expression = `negate(${expression})`;
      calculate();
    }
  }

  function moveLeft() {
    // Placeholder for cursor movement
  }
  function moveRight() {
    // Placeholder for cursor movement
  }

  function calculate() {
    try {
      let expr = expression.replace(/Ans/g, ans);
      let evalResult = mathInstance.evaluate(expr);
      
      if (typeof evalResult === 'object' && evalResult.im !== undefined) {
        result = evalResult.toString();
      } else {
        result = mathInstance.format(evalResult, { precision: 12 });
      }
      
      ans = evalResult;
      expression = result;
      
      history.push(expr + ' = ' + result);
      if (history.length > MAX_HISTORY) history.shift();
      
    } catch (e) {
      result = 'Error';
    }
    updateDisplay();
  }

  function toggleShift() {
    shift = !shift;
    document.querySelector('.shift').style.outline = shift ? '2px solid #4caf50' : 'none';
    document.querySelectorAll('.small').forEach(el => {
      el.textContent = shift ? el.dataset.shift : el.dataset.normal;
    });
  }

  function toggleMenu() {
    document.getElementById('menuOverlay').classList.toggle('active');
  }

  function openMode() {
    toggleMenu();
    document.getElementById('modeModal').classList.add('active');
  }

  function setMode() {
    angleMode = document.getElementById('angleMode').value;
    mathInstance.config({ angle: angleMode });
    document.getElementById('modeModal').classList.remove('active');
    updateDisplay();
  }

  function showHistory() {
    toggleMenu();
    alert(history.slice(-10).join('\n') || 'No history yet');
  }

  async function copyResult() {
    try {
      await navigator.clipboard.writeText(result);
      alert('Copied to clipboard');
    } catch (e) {
      alert('Copy failed. Check permissions.');
    }
  }

  window.handleKey = handleKey;
  window.append = append;
  window.clearAll = clearAll;
  window.del = del;
  window.toggleNegate = toggleNegate;
  window.moveLeft = moveLeft;
  window.moveRight = moveRight;
  window.calculate = calculate;
  window.toggleShift = toggleShift;
  window.toggleMenu = toggleMenu;
  window.openMode = openMode;
  window.setMode = setMode;
  window.showHistory = showHistory;
  window.copyResult = copyResult;

  document.addEventListener('keydown', (e) => {
    if ((e.key >= '0' && e.key <= '9') || e.key === '.') append(e.key);
    if (['+', '-', '*', '/'].includes(e.key)) append(e.key);
    if (e.key === 'Enter') calculate();
    if (e.key === 'Backspace') del();
    if (e.key === 'Escape') clearAll();
    if (e.key === '(' || e.key === ')') append(e.key);
  });

  updateDisplay();
</script>
</body>
</html>
